<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="minimum-scale=1, initial-scale=1, width=device-width, shrink-to-fit=no"
    />
    <meta name="theme-color" content="#071F16" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="shortcut icon" href="./favicon.ico" />
    <title>GestPro — Gestion d'entreprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      .loader-container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;
        background-color: #071F16;
        gap: 24px;
      }

      .loader {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        border: 3px solid rgba(108,165,104,0.15);
        border-top-color: #6CA568;
        animation: spin 0.9s linear infinite;
        box-shadow: 0 0 20px rgba(108,165,104,0.1);
      }

      .loader-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #9FBAA8;
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.03em;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>

  <body>
    <noscript> Vous devez activer JavaScript pour utiliser cette application. </noscript>
    <div id="root">
      <div class="loader-container">
        <div class="loader"></div>
        <div class="loader-text">Chargement…</div>
      </div>
    </div>
  </body>
  <script type="module" src="/src/index.tsx"></script>
</html>
